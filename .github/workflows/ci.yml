name: Test CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  vitest:
    name: Vitest Mainline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test type check
        run: npm run test:type-check

      - name: Run fast test suite
        run: npm run test:fast

      - name: Run extension host smoke tests
        run: npm run test:extension-host
