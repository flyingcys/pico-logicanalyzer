name: 质量门禁

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - 'parallel/**'

jobs:
  quality:
    name: typecheck / lint / tests / package
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            src/web-app/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 安装 Web 应用依赖
        run: npm ci --prefix src/web-app

      - name: TypeScript 基线检查
        run: npm run typecheck

      - name: Strict 分阶段检查
        run: npm run typecheck:strict

      - name: ESLint 检查
        run: npm run lint

      - name: 单元测试与覆盖率门禁（不含压力/性能/e2e）
        run: npm run test:unit -- --coverage

      - name: 集成测试
        run: npm run test:integration

      - name: Quick CI 测试
        run: npm run test:ci:quick -- --skip-install

      - name: Web 应用覆盖率门禁
        run: npm --prefix src/web-app run test:coverage

      - name: Driver 测试
        run: npm run test:drivers -- --runInBand

      - name: Decoder 测试
        run: npm run test:decoders -- --runInBand

      - name: VSIX 打包 dry run
        run: npm run package:dry
